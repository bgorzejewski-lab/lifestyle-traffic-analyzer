version: '3.8'

services:
  lifestyle-analyzer:
    build: .
    container_name: lifestyle-traffic-analyzer
    ports:
      - "8501:8501"
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
